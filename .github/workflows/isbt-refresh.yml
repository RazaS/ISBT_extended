name: Refresh ISBT Cache

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh cache
        id: refresh
        run: |
          STATUS=$(python scripts/refresh_isbt_cache.py)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "Refresh status: $STATUS"

      - name: Commit and push cache update
        if: steps.refresh.outputs.status == 'changed'
        run: |
          git config user.name "isbt-refresh-bot"
          git config user.email "isbt-refresh-bot@users.noreply.github.com"
          STAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git add isbt_cache.json
          git commit -m "Refresh ISBT cache ($STAMP)"
          git push
